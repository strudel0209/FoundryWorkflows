#
# Vendor Due Diligence Workflow
# Pattern: Sequential with Human-in-the-Loop (HITL) branch
#
# Output pattern: Each InvokeAzureAgent uses output: messages: to capture
# the agent response, then MessageText() extracts plain text for downstream use.
# This follows the official microsoft/agent-framework samples.
#
# Flow:
#   0. Intent Classification (LLM-based routing)
#   1. Market Intelligence (Bing Grounding)
#   2. Policy & Compliance Check (File Search)
#   3. Financial Risk Analysis (Code Interpreter)
#   4. Risk Scoring (Code Interpreter)
#   5a. [If HIGH/CRITICAL] -> HITL: Human Approval
#   5b. [If LOW/MEDIUM]    -> Auto-proceed
#   6. Contract Drafting (File Search)
#
kind: workflow
name: vendor-due-diligence-workflow
trigger:
  kind: OnConversationStart
  id: vendor_due_diligence_workflow
  actions:

    # STEP 0: Intent Classification — LLM determines if this is a vendor request
    # NOTE: conversationId is intentionally omitted here. This agent returns
    # structured JSON for internal workflow routing — not for user display.
    # Omitting conversationId runs it in an isolated ephemeral conversation
    # so the JSON never appears in the user's chat. Foundry traces still
    # capture the invocation for logging/monitoring purposes.
    - kind: InvokeAzureAgent
      id: classify_intent
      displayName: "Step 0 - Classify User Intent"
      agent:
        name: intent-classifier-agent
      input:
        messages: =UserMessage(System.LastMessage.Text)
      output:
        responseObject: Local.IntentResult
        autoSend: false

    - kind: ConditionGroup
      id: route_on_intent
      displayName: Route Based on Intent
      conditions:
        - id: intent_is_vendor
          condition: =Local.IntentResult.intent = "vendor_diligence"
          actions:
            - kind: SetVariable
              id: set_vendor_from_intent
              displayName: Set Vendor Request from Intent
              variable: Local.VendorRequest
              value: =Local.IntentResult.vendor_query
            - kind: SendActivity
              id: welcome_message
              displayName: Send Welcome Message
              activity: "Starting vendor due diligence. Running 4 sequential analysis agents now."
      elseActions:
        # Greet the user and ask for vendor details
        - kind: Question
          id: ask_vendor_details
          displayName: Greet and Ask for Vendor Details
          variable: Local.VendorRequest
          prompt: |-
            Hi there! I'm the Vendor Due Diligence Assistant for Contoso Corp.
            I help evaluate vendors by running market intelligence, compliance checks, financial risk analysis, and risk scoring — all automated.

            To get started, please provide the vendor name and any relevant context.
            For example: "Northwind Traders, a logistics company in Germany, estimated contract $500K"
          entity: StringPrebuiltEntity
          alwaysPrompt: false
        - kind: SendActivity
          id: welcome_after_ask
          displayName: Confirm Vendor and Start
          activity: "Starting vendor due diligence. Running 4 sequential analysis agents now."

    # STEP 1: Market Intelligence Agent (Bing Grounding)
    - kind: InvokeAzureAgent
      id: market_intelligence_step
      displayName: "Step 1 - Market Intelligence (Bing Grounding)"
      agent:
        name: market-intelligence-agent
      conversationId: =System.ConversationId
      input:
        messages: '=UserMessage("Research this vendor: " & Local.VendorRequest)'
      output:
        messages: Local.MarketIntelligenceMessages

    - kind: SetVariable
      id: extract_market_result
      displayName: Extract Market Intelligence Text
      variable: Local.MarketIntelligenceResult
      value: =MessageText(Local.MarketIntelligenceMessages)

    - kind: SendActivity
      id: market_done_message
      displayName: Market Intelligence Complete
      activity: "Step 1/4 done. Market Intelligence analysis complete."

    # STEP 2: Policy & Compliance Agent (File Search)
    - kind: InvokeAzureAgent
      id: policy_compliance_step
      displayName: "Step 2 - Policy and Compliance Check (File Search)"
      agent:
        name: policy-compliance-agent
      conversationId: =System.ConversationId
      input:
        messages: '=UserMessage("Check vendor compliance for: " & Local.VendorRequest & "\n\nMarket Intelligence context: " & Local.MarketIntelligenceResult)'
      output:
        messages: Local.ComplianceMessages

    - kind: SetVariable
      id: extract_compliance_result
      displayName: Extract Compliance Text
      variable: Local.ComplianceResult
      value: =MessageText(Local.ComplianceMessages)

    - kind: SendActivity
      id: compliance_done_message
      displayName: Compliance Check Complete
      activity: "Step 2/4 done. Policy and Compliance check complete."

    # STEP 3: Financial Risk Agent (Code Interpreter)
    - kind: InvokeAzureAgent
      id: financial_risk_step
      displayName: "Step 3 - Financial Risk Analysis (Code Interpreter)"
      agent:
        name: financial-risk-agent
      conversationId: =System.ConversationId
      input:
        messages: '=UserMessage("Perform financial risk analysis for: " & Local.VendorRequest & "\n\nCompliance output: " & Local.ComplianceResult)'
      output:
        messages: Local.FinancialRiskMessages

    - kind: SetVariable
      id: extract_financial_result
      displayName: Extract Financial Risk Text
      variable: Local.FinancialRiskResult
      value: =MessageText(Local.FinancialRiskMessages)

    - kind: SendActivity
      id: financial_done_message
      displayName: Financial Analysis Complete
      activity: "Step 3/4 done. Financial risk analysis complete."

    # STEP 4: Risk Scoring Agent (Code Interpreter)
    - kind: SetVariable
      id: build_scoring_input
      displayName: Build Scoring Agent Input
      variable: Local.ScoringInput
      value: ="Calculate composite risk score using:\n\nMARKET INTELLIGENCE:\n" & Local.MarketIntelligenceResult & "\n\nCOMPLIANCE:\n" & Local.ComplianceResult & "\n\nFINANCIAL RISK:\n" & Local.FinancialRiskResult

    - kind: InvokeAzureAgent
      id: risk_scoring_step
      displayName: "Step 4 - Composite Risk Scoring (Code Interpreter)"
      agent:
        name: risk-scoring-agent
      conversationId: =System.ConversationId
      input:
        messages: =UserMessage(Local.ScoringInput)
      output:
        messages: Local.RiskScoringMessages

    - kind: SetVariable
      id: extract_scoring_result
      displayName: Extract Risk Scoring Text
      variable: Local.RiskScoringResult
      value: =MessageText(Local.RiskScoringMessages)

    - kind: SendActivity
      id: scoring_done_message
      displayName: Risk Scoring Complete
      activity: "Step 4/4 done. Composite risk score calculated."

    # STEP 5: Branch on routing_decision
    - kind: ConditionGroup
      id: route_on_risk
      displayName: Route on Risk Decision
      conditions:
        - id: auto_reject_branch
          condition: =!IsBlank(Find("AUTO_REJECT", Local.RiskScoringResult))
          actions:
            - kind: SetVariable
              id: build_reject_message
              displayName: Build Rejection Message
              variable: Local.RejectMessage
              value: ="VENDOR REJECTED - Critical Risk Score\n\nThis vendor has been automatically rejected based on the composite risk assessment.\nNo further action is required. The procurement request has been closed.\n\nRisk Report:\n" & Local.RiskScoringResult
            - kind: SendActivity
              id: auto_reject_message
              displayName: Auto-Reject Notification
              activity: =Local.RejectMessage
            - kind: EndWorkflow
              id: end_rejected
              displayName: End Workflow (Rejected)

        - id: hitl_branch
          condition: =!IsBlank(Find("HITL_REQUIRED", Local.RiskScoringResult))
          actions:
            - kind: SetVariable
              id: build_hitl_report
              displayName: Build HITL Report Message
              variable: Local.HitlReportMessage
              value: ="HIGH RISK VENDOR - Human Approval Required\n\nThe automated risk assessment has classified this vendor as HIGH RISK. Please review the full risk report below and provide your decision.\n\n" & Local.RiskScoringResult

            - kind: SendActivity
              id: hitl_pre_message
              displayName: Present Risk Report to Human
              activity: =Local.HitlReportMessage

            - kind: Question
              id: human_approval_question
              displayName: "HITL - Procurement Manager Approval"
              variable: Local.HumanDecision
              prompt: "Based on the risk report above, please choose your action: Type APPROVE to proceed with contract drafting, REJECT to decline this vendor, or MORE_INFO to request additional information before deciding."
              entity: StringPrebuiltEntity
              alwaysPrompt: false

            - kind: ConditionGroup
              id: branch_on_human_decision
              displayName: Branch on Human Decision
              conditions:
                - id: human_approved
                  condition: =Upper(Trim(Local.HumanDecision)) = "APPROVE"
                  actions:
                    - kind: SetVariable
                      id: set_approved
                      variable: Local.ProceedToContract
                      value: "true"

                - id: human_more_info
                  condition: =Upper(Trim(Local.HumanDecision)) = "MORE_INFO"
                  actions:
                    - kind: Question
                      id: more_info_question
                      displayName: Request Clarification from User
                      variable: Local.AdditionalInfoRequest
                      prompt: "What additional information do you need about this vendor? Please describe your concerns and I will research further."
                      entity: StringPrebuiltEntity
                      alwaysPrompt: false

                    - kind: InvokeAzureAgent
                      id: followup_research
                      displayName: Follow-Up Research
                      agent:
                        name: market-intelligence-agent
                      conversationId: =System.ConversationId
                      input:
                        messages: '=UserMessage("Additional research requested: " & Local.AdditionalInfoRequest & "\n\nOriginal vendor: " & Local.VendorRequest)'
                      output:
                        messages: Local.AdditionalResearchMessages

                    - kind: SetVariable
                      id: extract_additional_research
                      displayName: Extract Additional Research Text
                      variable: Local.AdditionalResearch
                      value: =MessageText(Local.AdditionalResearchMessages)

                    - kind: SetVariable
                      id: build_followup_question
                      displayName: Build Follow-Up Question
                      variable: Local.FollowupQuestion
                      value: ="Additional research complete:\n\n" & Local.AdditionalResearch & "\n\nDo you now APPROVE or REJECT this vendor?"

                    - kind: Question
                      id: final_decision_after_research
                      displayName: Final Decision After Additional Research
                      variable: Local.FinalHumanDecision
                      prompt: =Local.FollowupQuestion
                      entity: StringPrebuiltEntity
                      alwaysPrompt: false

                    - kind: ConditionGroup
                      id: final_approve_check
                      displayName: Final Approve Check
                      conditions:
                        - id: final_approved
                          condition: =Upper(Trim(Local.FinalHumanDecision)) = "APPROVE"
                          actions:
                            - kind: SetVariable
                              id: set_final_approved
                              variable: Local.ProceedToContract
                              value: "true"
                      elseActions:
                        - kind: SetVariable
                          id: set_final_rejected
                          variable: Local.ProceedToContract
                          value: "false"
              elseActions:
                - kind: SetVariable
                  id: set_human_rejected
                  variable: Local.ProceedToContract
                  value: "false"
      elseActions:
        - kind: SetVariable
          id: set_auto_approved
          displayName: Set Auto-Approved
          variable: Local.ProceedToContract
          value: "true"

    # STEP 6: Contract Drafting (if approved)
    - kind: ConditionGroup
      id: check_proceed_to_contract
      displayName: Proceed to Contract Drafting?
      conditions:
        - id: contract_approved
          condition: =Local.ProceedToContract = "true"
          actions:
            - kind: Question
              id: gather_contract_details
              displayName: Gather Contract Deal Terms
              variable: Local.ContractDetails
              prompt: "Vendor approved! To generate the contract, please provide: 1) Services/goods to be supplied, 2) Contract start date (MM/DD/YYYY), 3) Contract duration (e.g. 12 months), 4) Payment terms (Net 30 / Net 60), 5) Your name and title (Contoso signatory)"
              entity: StringPrebuiltEntity
              alwaysPrompt: false

            - kind: SetVariable
              id: build_contract_input
              displayName: Build Contract Drafting Input
              variable: Local.ContractInput
              value: '="Draft vendor contract using:\n\nVENDOR INFO: " & Local.VendorRequest & "\n\nRISK REPORT: " & Local.RiskScoringResult & "\n\nDEAL TERMS: " & Local.ContractDetails'

            - kind: InvokeAzureAgent
              id: contract_drafting_step
              displayName: "Step 6 - Contract Drafting (File Search)"
              agent:
                name: contract-drafting-agent
              conversationId: =System.ConversationId
              input:
                messages: =UserMessage(Local.ContractInput)
              output:
                messages: Local.ContractDraftMessages

            - kind: SetVariable
              id: extract_contract_draft
              displayName: Extract Contract Draft Text
              variable: Local.ContractDraft
              value: =MessageText(Local.ContractDraftMessages)

            - kind: SetVariable
              id: build_contract_message
              displayName: Build Contract Done Message
              variable: Local.ContractMessage
              value: ="CONTRACT DRAFT GENERATED\n\nThe vendor contract has been drafted and is ready for legal review.\n\n" & Local.ContractDraft

            - kind: SendActivity
              id: contract_done_message
              displayName: Contract Draft Complete
              activity: =Local.ContractMessage

            - kind: SendActivity
              id: workflow_complete_message
              displayName: Workflow Complete
              activity: |-
                Vendor Due Diligence Workflow Complete!

                Summary:
                - Market Intelligence: Done
                - Policy and Compliance: Done
                - Financial Risk Analysis: Done
                - Risk Scoring: Done
                - Human Approval (if required): Done
                - Contract Drafted: Done

                Next step: Send contract to Legal for final review before signature.
      elseActions:
        - kind: SendActivity
          id: rejection_summary
          displayName: Rejection Summary
          activity: |-
            Vendor Due Diligence Workflow Complete - Vendor Rejected.

            This vendor has not been approved for onboarding.
            The procurement request has been closed.
            Refer to the risk report for details.